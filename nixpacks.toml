[phases.setup]
nixPkgs = [
  "nodejs_20",
  "chromium",
  "nss",
  "nspr",
  "atk",
  "cups",
  "libdrm",
  "dbus",
  "libxkbcommon",
  "gtk3",
  "pango",
  "cairo",
  "glib",
  "alsa-lib"
]

[phases.install]
cmds = ["npm install"]

[start]
cmd = "PUPPETEER_EXECUTABLE_PATH=$(which chromium) node bot.js"
